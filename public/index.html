<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clientes IXC</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="toolbar" aria-label="Controles">
        <div>
          <h1>Clientes IXC</h1>
          <p id="status">Carregue a lista para consultar nome, login, bairro e PON.</p>
        </div>
        <div class="actions">
          <button id="refreshButton" type="button">Atualizar</button>
          <button id="exportButton" type="button" disabled>Exportar Excel</button>
        </div>
      </section>

      <section class="filters" aria-label="Filtros">
        <label>
          Buscar
          <input id="searchInput" type="search" placeholder="Nome, login, bairro ou PON" autocomplete="off" />
        </label>
        <label>
          PON
          <select id="ponInput">
            <option value="">Todas</option>
          </select>
        </label>
        <label>
          Por página
          <select id="pageSizeInput">
            <option value="25" selected>25</option>
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="200">200</option>
          </select>
        </label>
      </section>

      <section class="tableShell">
        <table>
          <thead>
            <tr>
              <th>Nome do cliente</th>
              <th>Telefone/Contato</th>
              <th>Login</th>
              <th>Bairro</th>
              <th>PON</th>
              <th>
                <span>Cliente ativo</span>
                <select id="clienteAtivoInput" class="columnFilter" aria-label="Filtrar cliente ativo">
                  <option value="">Todos</option>
                  <option value="Sim">Sim</option>
                  <option value="Não">Não</option>
                </select>
              </th>
              <th>
                <span>Online</span>
                <select id="onlineInput" class="columnFilter" aria-label="Filtrar online">
                  <option value="">Todos</option>
                  <option value="Sim">Sim</option>
                  <option value="Não">Não</option>
                </select>
              </th>
              <th>
                <span>Status contrato</span>
                <select id="statusContratoInput" class="columnFilter" aria-label="Filtrar status contrato">
                  <option value="">Todos</option>
                  <option value="Ativo">Ativo</option>
                  <option value="Inativo">Inativo</option>
                  <option value="Pré-contrato">Pré-contrato</option>
                  <option value="Negativado">Negativado</option>
                  <option value="Desistiu">Desistiu</option>
                </select>
              </th>
              <th>
                <span>Status acesso</span>
                <select id="statusAcessoInput" class="columnFilter" aria-label="Filtrar status acesso">
                  <option value="">Todos</option>
                  <option value="Ativo">Ativo</option>
                  <option value="Desativado">Desativado</option>
                  <option value="Corte manual">Corte manual</option>
                  <option value="Corte automático">Corte automático</option>
                  <option value="Financeiro em atraso">Financeiro em atraso</option>
                  <option value="Aguardando assinatura">Aguardando assinatura</option>
                </select>
              </th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="9" class="empty">Nenhum dado carregado.</td>
            </tr>
          </tbody>
        </table>
      </section>

      <nav class="pagination" aria-label="Paginação">
        <button id="previousButton" type="button" disabled>Anterior</button>
        <span id="pageInfo">Página 1 de 1</span>
        <button id="nextButton" type="button" disabled>Próxima</button>
      </nav>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
